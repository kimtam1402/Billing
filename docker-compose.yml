version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mongodb+srv://...
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: always

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
    volumes:
      - n8n_data:/home/node/.local/share/n8n
    network_mode: "host" # Quan trọng để n8n gọi localhost:3000 trên Linux

# ĐƯA PHẦN NÀY RA NGOÀI CÙNG (Sát lề trái)
volumes:
  n8n_data: